name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r backend/requirements.txt

      - name: Compile Python sources
        run: python -m compileall backend/

      - name: Run full test suite
        env:
          TESTING: "1"
        run: python -m pytest tests/ -q --tb=short

  security-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install security tools
        run: pip install bandit[toml]

      - name: Run bandit scan
        run: |
          bandit -r backend/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            --confidence-level medium \
            -x backend/.env.example \
            || true

      - name: Evaluate bandit results
        run: |
          python3 -c "
          import json, sys
          try:
              with open('bandit-results.json') as f:
                  data = json.load(f)
              results = data.get('results', [])
              high = [r for r in results if r.get('issue_severity') == 'HIGH']
              medium = [r for r in results if r.get('issue_severity') == 'MEDIUM']
              print(f'Bandit: {len(high)} high, {len(medium)} medium, {len(results)} total')
              if high:
                  print('::error::发现高危安全问题，PR 将被阻断')
                  for r in high:
                      print(f'::error file={r[\"filename\"]},line={r[\"line_number\"]}::{r[\"issue_text\"]}')
              if medium:
                  for r in medium:
                      print(f'::warning file={r[\"filename\"]},line={r[\"line_number\"]}::{r[\"issue_text\"]}')
              sys.exit(1 if high else 0)
          except FileNotFoundError:
              print('No bandit results found')
          "

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

  frontend-build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx vue-tsc --noEmit

      - name: Build
        run: npx vite build

  gate:
    needs: [backend-tests, security-scan, frontend-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [ "${{ needs.backend-tests.result }}" != "success" ]; then
            echo "::error::Backend tests failed"
            exit 1
          fi
          if [ "${{ needs.security-scan.result }}" == "failure" ]; then
            echo "::error::Security scan found high-severity issues"
            exit 1
          fi
          if [ "${{ needs.frontend-build.result }}" != "success" ]; then
            echo "::error::Frontend build failed"
            exit 1
          fi
          echo "All checks passed"
