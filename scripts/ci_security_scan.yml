# E1-01 PR 安全审查集成 — GitHub Actions 安全扫描工作流
# 集成 bandit (Python安全静态分析) + semgrep (规则自定义扫描)
# 高危发现阻断PR合并，中危生成警告

name: Security Scan

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  bandit-scan:
    name: Bandit Python Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install bandit
        run: pip install bandit[toml]

      - name: Run bandit scan
        run: |
          bandit -r backend/ \
            -f json \
            -o bandit-results.json \
            --severity-level medium \
            --confidence-level medium \
            -x backend/.env.example \
            || true

      - name: Parse bandit results
        id: bandit
        run: |
          python3 -c "
          import json, sys
          try:
              with open('bandit-results.json') as f:
                  data = json.load(f)
              results = data.get('results', [])
              high = [r for r in results if r.get('issue_severity') == 'HIGH']
              medium = [r for r in results if r.get('issue_severity') == 'MEDIUM']
              print(f'::set-output name=high_count::{len(high)}')
              print(f'::set-output name=medium_count::{len(medium)}')
              print(f'::set-output name=total::{len(results)}')
              if high:
                  print('::error::发现高危安全问题，PR 将被阻断')
                  for r in high:
                      print(f'::error file={r[\"filename\"]},line={r[\"line_number\"]}::{r[\"issue_text\"]}')
              if medium:
                  for r in medium:
                      print(f'::warning file={r[\"filename\"]},line={r[\"line_number\"]}::{r[\"issue_text\"]}')
              sys.exit(1 if high else 0)
          except FileNotFoundError:
              print('No bandit results found')
              sys.exit(0)
          "

      - name: Upload bandit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bandit-results
          path: bandit-results.json

  semgrep-scan:
    name: Semgrep Security Scan
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Run semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/python
            p/security-audit
            p/owasp-top-ten
          generateSarif: true
        env:
          SEMGREP_RULES: p/python p/security-audit p/owasp-top-ten
        continue-on-error: true

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: semgrep.sarif
        continue-on-error: true

  security-gate:
    name: Security Gate
    needs: [bandit-scan, semgrep-scan]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check security scan results
        run: |
          if [ "${{ needs.bandit-scan.result }}" == "failure" ]; then
            echo "::error::Bandit 发现高危安全问题，PR 被阻断"
            exit 1
          fi
          echo "安全扫描通过"
